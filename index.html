<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 News Digest — ホーム</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2333;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent-red: #e5383b;
    --accent-yellow: #f0c040;
    --accent-blue: #58a6ff;
    --border: #30363d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 60px 20px 48px;
    background: linear-gradient(135deg, #0d1117 0%, #1a1020 40%, #1c0a0a 100%);
    border-bottom: 2px solid var(--accent-red);
  }
  .hero h1 {
    font-size: 2.4em;
    font-weight: 800;
    letter-spacing: .03em;
    margin-bottom: 8px;
  }
  .hero h1 .red { color: var(--accent-red); }
  .hero .subtitle {
    color: var(--text-dim);
    font-size: 1em;
    max-width: 520px;
    margin: 0 auto;
  }
  .hero .badge {
    display: inline-block;
    margin-top: 16px;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: .78em;
    background: rgba(229,56,59,.15);
    color: var(--accent-red);
    border: 1px solid rgba(229,56,59,.3);
  }

  /* Main */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 16px 60px;
  }

  .section-label {
    font-size: .85em;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Digest list */
  .digest-list { list-style: none; }
  .digest-item {
    display: block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 12px;
    text-decoration: none;
    color: var(--text);
    transition: all .2s;
    cursor: pointer;
  }
  .digest-item:hover {
    border-color: var(--accent-red);
    background: var(--bg-card-hover);
    transform: translateX(4px);
    text-decoration: none;
  }
  .digest-item .date-label {
    font-size: 1.1em;
    font-weight: 700;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .digest-item .date-label .day {
    display: inline-block;
    background: var(--accent-red);
    color: #fff;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: .8em;
    font-weight: 600;
  }
  .digest-item .preview {
    margin-top: 8px;
    font-size: .88em;
    color: var(--text-dim);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .digest-item .tags {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .digest-item .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: .72em;
    background: rgba(88,166,255,.1);
    color: var(--accent-blue);
    border: 1px solid rgba(88,166,255,.2);
  }
  .digest-item .tag.jp {
    background: rgba(255,64,87,.1);
    color: var(--accent-red);
    border-color: rgba(255,64,87,.2);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 3em; margin-bottom: 16px; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px;
    font-size: .78em;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  @media (max-width: 600px) {
    .hero { padding: 40px 16px 32px; }
    .hero h1 { font-size: 1.7em; }
    .digest-item { padding: 16px; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>🏎️ F1 <span class="red">News Digest</span></h1>
  <div class="subtitle">信頼性の高いソースのみを厳選した<br>F1最新ニュースダイジェスト</div>
  <div class="badge">🇯🇵 日本関連トピック特別枠付き</div>
</div>

<div class="container">
  <div class="section-label">📰 ダイジェスト一覧</div>
  <div id="digest-list" class="loading">読み込み中...</div>
</div>

<div class="footer">
  F1 News Digest — 信頼性の高いソースのみを厳選<br>
  Powered by Claude
</div>

<script>
const digests = [
  {
    date: "2026-03-08",
    dayOfWeek: "日",
    title: "2026年3月8日 — オーストラリアGP 決勝日",
    file: "f1-news-digest-2026-03-08.html",
    preview: "メルセデス圧巻のフロントロー独占、フェルスタッペンQ1クラッシュ、ホンダ深刻な振動問題。2026年シーズン開幕戦の全貌。",
    tags: ["オーストラリアGP", "メルセデス", "フェルスタッペン"],
    jpTags: ["角田裕毅", "ホンダ", "TGRハース", "小松礼雄"]
  }
];

function renderDigests() {
  const container = document.getElementById('digest-list');
  if (digests.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>まだダイジェストがありません。</p></div>';
    return;
  }
  const list = document.createElement('ul');
  list.className = 'digest-list';
  digests.forEach(d => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.className = 'digest-item';
    a.href = d.file;
    let tagsHtml = d.tags.map(t => '<span class="tag">' + t + '</span>').join('');
    tagsHtml += d.jpTags.map(t => '<span class="tag jp">🇯🇵 ' + t + '</span>').join('');
    a.innerHTML = '<div class="date-label"><span class="day">' + d.dayOfWeek + '</span>' + d.title + '</div><div class="preview">' + d.preview + '</div><div class="tags">' + tagsHtml + '</div>';
    li.appendChild(a);
    list.appendChild(li);
  });
  container.innerHTML = '';
  container.appendChild(list);
}
renderDigests();
</script>

</body>
</html>
